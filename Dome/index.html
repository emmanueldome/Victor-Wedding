<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Wedding Reception Check-in</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{

font-family:'Playfair Display',serif;

background:#f7f7f7;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

}

.container{

background:white;

padding:35px;

width:100%;

max-width:500px;

border-radius:25px;

box-shadow:
0 10px 30px rgba(
0,0,0,0.1
);

text-align:center;

}

h1{

color:#9CAF88;

margin-bottom:10px;

}

p{

color:#666;

}

input{

width:100%;

padding:15px;

border-radius:15px;

border:1px solid #ddd;

margin-top:20px;

font-size:1rem;

}

button{

width:100%;

margin-top:15px;

padding:15px;

border:none;

border-radius:30px;

font-size:1rem;

font-weight:bold;

cursor:pointer;

background:linear-gradient(
135deg,
#9CAF88,
#D4AF37
);

color:white;

}

button:hover{

opacity:0.9;

}

#results{

margin-top:25px;

padding:15px;

border-radius:15px;

background:#f8f8f8;

text-align:left;

}

</style>

</head>

<body>

<div class="container">

<h1>
Wedding Reception
</h1>

<p>
Confirm guest entry
</p>

<input
type="text"
id="guestName"
placeholder="Enter Guest Name">

<button onclick="confirmEntry()">

✅ Confirm Entry

</button>

<button onclick="viewEntries()">

📋 View Entries

</button>

<div id="results"></div>

</div>


<script>

function confirmEntry(){

const guest=

document.getElementById(
"guestName"
).value.trim();

if(guest===""){

alert(
"Enter guest name"
);

return;

}

let entries=

JSON.parse(
localStorage.getItem(
"guestEntries"
)
) || [];


const exists=

entries.some(
e=>
e.guest.toLowerCase()
===
guest.toLowerCase()
);


if(exists){

alert(
"Guest already entered ⚠️"
);

return;

}


const time=

new Date()
.toLocaleTimeString();


entries.push({

guest:guest,

time:time

});


localStorage.setItem(

"guestEntries",

JSON.stringify(
entries
)

);


document.getElementById(
"guestName"
).value="";


alert(
"Entry confirmed ✅"
);

viewEntries();

}


function viewEntries(){

const entries=

JSON.parse(
localStorage.getItem(
"guestEntries"
)
)||[];


let html=`
<h3>
Checked-in Guests
</h3>
`;

entries.forEach(
(e,index)=>{

html+=`

${index+1}.
${e.guest}
(${e.time})

<br><br>

`;

});


html+=`

<hr>

<b>Total Guests:</b>

${entries.length}

`;


document.getElementById(
"results"
).innerHTML=
html;

}

viewEntries();

</script>

</body>
</html>
