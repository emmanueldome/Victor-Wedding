<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="top-decoration">❦</div>

  <img src="../Assets/image/p-e.jpeg"
       alt="Wedding Picture"
       class="centered-image">

  <!-- LANGUAGE -->
  <div class="lang-switch">
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('sw')">Swahili</button>
  </div>

  <!-- TITLE -->
  <h1 id="site-title">Wedding Invitation</h1>

  <div class="decorative-line"></div>

  <!-- ELEGANT COUPLE NAME -->
  <h2 id="couple-names">
    Victor & Laurencia
  </h2>

  <div class="decorative-line small"></div>

  <!-- INFO -->
  <p id="date"><strong>Date:</strong> Sunday, 24 May 2026</p>
  <p id="time"><strong>Time:</strong> 18:00 PM</p>
  <p id="venue"><strong>Venue:</strong> Mwenge Social Hall, Dar es Salaam</p>

  <a href="https://maps.google.com/?q=Mwenge+Social+Hall" target="_blank">
    📍 View Venue Location
  </a>

  <p class="invite-text" id="invite-text">
    You are warmly invited to celebrate our special day
  </p>

  <!-- COUNTDOWN -->
  <div class="countdown-container">

    <h3>Countdown to Our Wedding</h3>

    <div id="countdown">
      <div class="countdown-box"><span id="days">00</span><small>Days</small></div>
      <div class="countdown-box"><span id="hours">00</span><small>Hours</small></div>
      <div class="countdown-box"><span id="minutes">00</span><small>Minutes</small></div>
      <div class="countdown-box"><span id="seconds">00</span><small>Seconds</small></div>
    </div>

  </div>

  <!-- WISHES -->
  <div class="rsvp-section">

    <h3 id="wish-title">Send Your Wedding Wishes</h3>

    <form onsubmit="sendWish(event)">

      <input type="text"
             id="guestName"
             placeholder="Your Full Name"
             required>

      <textarea id="message"
                placeholder="Your Blessing Message"></textarea>

      <button type="submit" id="send-btn">
        Send Wishes via WhatsApp
      </button>

    </form>

  </div>

</div>

<script>

/* ================= COUNTDOWN ================= */

const weddingDate = new Date("May 24, 2026 18:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = weddingDate - now;

  if (d <= 0) return;

  document.getElementById("days").textContent = Math.floor(d / (1000*60*60*24));
  document.getElementById("hours").textContent = Math.floor((d / (1000*60*60)) % 24);
  document.getElementById("minutes").textContent = Math.floor((d / (1000*60)) % 60);
  document.getElementById("seconds").textContent = Math.floor((d / 1000) % 60);

}, 1000);


/* ================= LANGUAGE ================= */

function setLang(lang){

  if(lang === "sw"){

    document.getElementById("site-title").innerText = "Mwaliko wa Harusi";

    document.getElementById("date").innerHTML = "<strong>Tarehe:</strong> Jumapili, 24 Mei 2026";
    document.getElementById("time").innerHTML = "<strong>Muda:</strong> Saa 12:00 Jioni";
    document.getElementById("venue").innerHTML = "<strong>Mahali:</strong> Ukumbi wa Mwenge, Dar es Salaam";

    document.getElementById("invite-text").innerText =
      "Mnakaribishwa kwa moyo mkunjufu kusherehekea siku yetu maalum";

    document.getElementById("wish-title").innerText =
      "Tuma Ujumbe wa Baraka kwa Maharusi";

    document.getElementById("guestName").placeholder = "Jina lako kamili";
    document.getElementById("message").placeholder = "Ujumbe wa baraka";

    document.getElementById("send-btn").innerText = "Tuma Baraka WhatsApp";

  } else {
    location.reload();
  }
}


/* ================= SEND WISH ================= */

function sendWish(e){
  e.preventDefault();

  const name = document.getElementById("guestName").value;
  const message = document.getElementById("message").value;

  const txt = `💍 WEDDING WISH
Name: ${name}
Message: ${message}`;

  window.open(
    "https://wa.me/255783532235?text=" + encodeURIComponent(txt),
    "_blank"
  );
}

</script>

</body>
</html>
