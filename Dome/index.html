<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Wedding Reception</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{

font-family:'Playfair Display',serif;

background:#f6f6f6;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

}

.container{

background:white;

padding:30px;

width:100%;

max-width:500px;

border-radius:25px;

box-shadow:
0 10px 25px rgba(
0,0,0,.1
);

text-align:center;

}

h1{

color:#9CAF88;

}

input{

width:100%;

padding:14px;

border-radius:15px;

border:1px solid #ddd;

margin-top:20px;

font-size:1rem;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:30px;

font-size:1rem;

font-weight:bold;

cursor:pointer;

background:linear-gradient(
135deg,
#9CAF88,
#D4AF37
);

color:white;

}

#results{

margin-top:20px;

padding:15px;

background:#f7f7f7;

border-radius:15px;

text-align:left;

}

</style>

</head>

<body>

<!-- PASSWORD SCREEN -->

<div id="loginBox" class="container">

<h1>Reception Access</h1>

<p>Enter Reception Password</p>

<input
type="password"
id="receptionPassword"
placeholder="Password">

<button onclick="loginReception()">

🔓 Enter

</button>

</div>


<!-- RECEPTION PANEL -->

<div
id="receptionPanel"
class="container"
style="display:none;">

<h1>
Wedding Reception
</h1>

<p>
Confirm Guest Entry
</p>

<input
list="guestList"
id="guestName"
placeholder="Search guest name">

<datalist id="guestList">

<option value="Mr & Mrs Godwin Msigwa">
<option value="Mr Mwaisanila">
<option value="Irene Masalu">

</datalist>


<button onclick="confirmEntry()">

✅ Confirm Entry

</button>


<button onclick="viewEntries()">

📋 View Entries

</button>


<div id="results"></div>

</div>


<script>
  
  function loginReception(){

const password =

document.getElementById(
"receptionPassword"
).value;


if(password==="2406"){

document.getElementById(
"loginBox"
).style.display="none";


document.getElementById(
"receptionPanel"
).style.display="block";

}
else{

alert(
"Wrong password ❌"
);

}

}

function confirmEntry(){

const guest=

document.getElementById(
"guestName"
).value.trim();

if(guest===""){

alert(
"Enter guest name"
);

return;

}

let entries=

JSON.parse(
localStorage.getItem(
"guestEntries"
)
)||[];


const exists=

entries.some(
e=>
e.guest.toLowerCase()
===
guest.toLowerCase()
);

if(exists){

alert(
"Guest already entered ⚠️"
);

return;

}


entries.push({

guest:guest,

time:
new Date()
.toLocaleTimeString()

});


localStorage.setItem(

"guestEntries",

JSON.stringify(
entries
)

);

alert(
"Entry confirmed ✅"
);

viewEntries();

}


function viewEntries(){

const entries=

JSON.parse(
localStorage.getItem(
"guestEntries"
)
)||[];


let html=
"<h3>Checked Guests</h3>";

entries.forEach(
(e,index)=>{

html+=`

${index+1}.
${e.guest}

(${e.time})

<br><br>

`;

});


html+=
`<hr>
<b>Total:
${entries.length}
</b>`;


document.getElementById(
"results"
).innerHTML=
html;

}

viewEntries();

</script>

</body>
</html>
